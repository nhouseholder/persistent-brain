name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint Python files
        run: |
          python3 -m py_compile router/brain_router.py
          python3 -m py_compile router/session_manager.py
          python3 -m py_compile router/observation_validator.py
          python3 -m py_compile router/auto_linker.py

      - name: Lint shell scripts
        run: |
          bash -n install.sh
          bash -n uninstall.sh
          for f in scripts/*.sh hooks/*.sh; do
            bash -n "$f" && echo "OK: $f"
          done

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run tests
        run: |
          pytest tests/ -v

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Homebrew (Linux)
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" </dev/null
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH

      - name: Install engram
        run: |
          brew tap gentleman-programming/tap
          brew install engram
          engram version

      - name: Run brain-status.sh
        run: |
          chmod +x scripts/brain-status.sh
          bash scripts/brain-status.sh

      - name: Validate install.sh
        run: bash -n install.sh
